<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  .game-container {
    background: #16213e;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 18px;
  }
  .score { color: #e94560; font-weight: 700; font-size: 22px; }
  canvas {
    display: block;
    border-radius: 8px;
    background: #0f3460;
    image-rendering: pixelated;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #c73652; }
  .game-over { color: #e94560; font-weight: 700; font-size: 16px; }
  .hint { color: #8899aa; font-size: 14px; margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<div class="game-container">
  <div class="header">
    <span>Snake</span>
    <span class="score" id="score">0</span>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="status"></div>
  <div class="controls">
    <button id="restartBtn">Новая игра</button>
  </div>
  <div class="hint">← ↑ → ↓ — управление, Пробел — пауза</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const statusEl = document.getElementById('status');

const GRID_SIZE = 20;
const CELL_SIZE = canvas.width / GRID_SIZE;
const TICK_MS = 130;

const DIR = {
  UP:    { x:  0, y: -1 },
  DOWN:  { x:  0, y:  1 },
  LEFT:  { x: -1, y:  0 },
  RIGHT: { x:  1, y:  0 },
};

const state = {
  snake: [],
  food: null,
  direction: null,
  nextDirection: null,
  score: 0,
  gameOver: false,
  paused: false,
};

let lastTick = 0;
let rafId = null;

function randomCell() {
  return {
    x: Math.floor(Math.random() * GRID_SIZE),
    y: Math.floor(Math.random() * GRID_SIZE),
  };
}

function spawnFood() {
  const occupied = new Set(state.snake.map(c => `${c.x},${c.y}`));
  if (occupied.size >= GRID_SIZE * GRID_SIZE) {
    state.gameOver = true;
    statusEl.textContent = '🎉 Вы выиграли!';
    return;
  }
  let cell;
  do { cell = randomCell(); } while (occupied.has(`${cell.x},${cell.y}`));
  state.food = cell;
}

function initGame() {
  const startX = Math.floor(GRID_SIZE / 2);
  const startY = Math.floor(GRID_SIZE / 2);
  state.snake = [
    { x: startX, y: startY },
    { x: startX - 1, y: startY },
    { x: startX - 2, y: startY },
  ];
  state.direction = DIR.RIGHT;
  state.nextDirection = DIR.RIGHT;
  state.score = 0;
  state.gameOver = false;
  state.paused = false;
  scoreEl.textContent = '0';
  statusEl.textContent = '';
  spawnFood();
}

function isOpposite(a, b) {
  return a.x + b.x === 0 && a.y + b.y === 0;
}

function tick() {
  if (state.gameOver || state.paused) return;

  state.direction = state.nextDirection;

  const head = state.snake[0];
  const newHead = {
    x: head.x + state.direction.x,
    y: head.y + state.direction.y,
  };

  if (
    newHead.x < 0 || newHead.x >= GRID_SIZE ||
    newHead.y < 0 || newHead.y >= GRID_SIZE
  ) {
    state.gameOver = true;
    statusEl.textContent = '💀 Game Over — стена';
    return;
  }

  const collides = state.snake.some(s => s.x === newHead.x && s.y === newHead.y);
  if (collides) {
    state.gameOver = true;
    statusEl.textContent = '💀 Game Over — тело';
    return;
  }

  state.snake.unshift(newHead);

  if (newHead.x === state.food.x && newHead.y === state.food.y) {
    state.score += 1;
    scoreEl.textContent = state.score;
    spawnFood();
  } else {
    state.snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#0f3460';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < state.snake.length; i++) {
    const s = state.snake[i];
    const t = i / Math.max(state.snake.length - 1, 1);
    const r = Math.round(30 + t * 60);
    const g = Math.round(200 - t * 80);
    const b = Math.round(130 - t * 60);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(
      s.x * CELL_SIZE + 1,
      s.y * CELL_SIZE + 1,
      CELL_SIZE - 2,
      CELL_SIZE - 2
    );
  }

  if (state.food) {
    ctx.fillStyle = '#e94560';
    const fx = state.food.x * CELL_SIZE + CELL_SIZE / 2;
    const fy = state.food.y * CELL_SIZE + CELL_SIZE / 2;
    ctx.beginPath();
    ctx.arc(fx, fy, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
  }

  if (state.paused && !state.gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Пауза', canvas.width / 2, canvas.height / 2);
  }
}

function loop(timestamp) {
  if (timestamp - lastTick >= TICK_MS) {
    lastTick = timestamp;
    tick();
    draw();
  }
  rafId = requestAnimationFrame(loop);
}

function handleKey(e) {
  const key = e.key;
  const map = {
    ArrowUp: DIR.UP,
    ArrowDown: DIR.DOWN,
    ArrowLeft: DIR.LEFT,
    ArrowRight: DIR.RIGHT,
  };

  if (key === ' ' || key === 'Spacebar') {
    e.preventDefault();
    if (!state.gameOver) {
      state.paused = !state.paused;
      draw();
    }
    return;
  }

  const dir = map[key];
  if (!dir) return;
  e.preventDefault();

  if (state.gameOver || state.paused) return;
  if (!isOpposite(dir, state.direction)) {
    state.nextDirection = dir;
  }
}

function restart() {
  cancelAnimationFrame(rafId);
  initGame();
  lastTick = performance.now();
  draw();
  rafId = requestAnimationFrame(loop);
}

document.addEventListener('keydown', handleKey);
document.getElementById('restartBtn').addEventListener('click', restart);

initGame();
lastTick = performance.now();
rafId = requestAnimationFrame(loop);
</script>
</body>
</html>
